<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Tree</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      text-align:center;
      margin:0;
    }

    h2 {
      color:white;
      padding:10px;
    }

    .form-box {
      background:white;
      padding:15px;
      border-radius:15px;
      display:inline-block;
      margin:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    input {
      margin:5px;
      padding:8px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button {
      padding:8px 15px;
      border:none;
      border-radius:8px;
      background:#6a11cb;
      color:white;
      cursor:pointer;
    }

    button:hover {
      background:#2575fc;
    }

    .tree { display:flex; flex-direction:column; align-items:center; }

    .node {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      padding:10px;
      border-radius:15px;
      margin:10px;
      width:180px;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
      color:#333;
    }

    img {
      width:70px;
      height:70px;
      border-radius:50%;
      border:3px solid white;
    }

    .children {
      display:flex;
      justify-content:center;
      gap:20px;
    }

    .line {
      width:2px;
      height:20px;
      background:white;
      margin:auto;
    }
  </style>
</head>
<body>

<h2>🌳 My Family Tree</h2>

<div class="form-box">
  <input id="name" placeholder="Name">
  <input id="relation" placeholder="Relation">
  <input id="photo" placeholder="Photo URL">
  <input id="fatherId" placeholder="Father ID">
  <br>
  <button onclick="addMember()">Add Member</button>
</div>

<div id="tree" class="tree"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAhbG6S9HmK9XaG8jO1oSqjMV-W3D6JP6o",
    authDomain: "family-tree-bd829.firebaseapp.com",
    projectId: "family-tree-bd829",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  async function addMember() {
    const name = document.getElementById('name').value;
    const relation = document.getElementById('relation').value;
    const photo = document.getElementById('photo').value;
    const fatherId = document.getElementById('fatherId').value;

    await db.collection('members').add({ name, relation, photo, fatherId });
    loadTree();
  }

  async function loadTree() {
    const container = document.getElementById('tree');
    container.innerHTML = '';

    const snapshot = await db.collection('members').get();
    let members = [];

    snapshot.forEach(doc => {
      members.push({ id: doc.id, ...doc.data() });
    });

    function createNode(member) {
      let children = members.filter(m => m.fatherId === member.id);

      let html = `<div class="node">
        <img src="${member.photo || 'https://via.placeholder.com/70'}">
        <h4>${member.name}</h4>
        <p>${member.relation || ''}</p>
      </div>`;

      if(children.length > 0) {
        html += `<div class="line"></div><div class="children">`;
        children.forEach(child => {
          html += createNode(child);
        });
        html += `</div>`;
      }

      return `<div>${html}</div>`;
    }

    let roots = members.filter(m => !m.fatherId);

    roots.forEach(root => {
      container.innerHTML += createNode(root);
    });
  }

  loadTree();
</script>

</body>
</html>
